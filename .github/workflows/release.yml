name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_NAME="termtrace${{ matrix.ext }}"
          OUT_DIR="dist/termtrace_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$OUT_DIR"

          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o "$OUT_DIR/$BIN_NAME" \
            ./cmd/termtrace

          cp README.md "$OUT_DIR/" || true
          cp LICENSE "$OUT_DIR/" || true

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "$(basename "$OUT_DIR").zip" "$(basename "$OUT_DIR")")
          else
            tar -C dist -czf "${OUT_DIR}.tar.gz" "$(basename "$OUT_DIR")"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
